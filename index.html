<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      @font-face {
        font-family: FigtreeVariable;
        src: url(assets/fonts/Figtree-VariableFont_wght.ttf);
      }
      @font-face {
        font-family: FigtreeItalic;
        src: url(assets/fonts/Figtree-Italic-VariableFont_wght.ttf);
      }
    </style>
  </head>
  <body>
    <section class="main-container">
      <div class="image-container">
        <img
          class="image"
          src="assets/images/illustration-article.svg"
          alt="Main Image"
        />
      </div>

      <section class="description-container">
        <h1 class="learning-heading">Learning</h1>

        <h2 class="sub-heading">Published 21 Dec 2023</h2>

        <p class="html-heading">HTML & CSS foundations</p>

        <p class="languages-heading">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </section>
      <section class="profile-container">
        <img
          class="profile-img"
          src="assets/images/image-avatar.webp"
          alt="Image avatar"
        />
        <h3>Greg Hooper</h3>
      </section>
    </section>
  </body>
</html>
